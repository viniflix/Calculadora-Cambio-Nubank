<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Câmbio Nubank</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Câmbio Nubank (PTAX)</h2>
    
    <label for="moeda">Moeda:</label>
    <select id="moeda">
      <option value="USD">Dólar Americano (USD)</option>
      <option value="JPY">Iene Japonês (JPY)</option>
      <option value="EUR">Euro (EUR)</option>
      <option value="GBP">Libra Esterlina (GBP)</option>
      <option value="CAD">Dólar Canadense (CAD)</option>
      <option value="ARS">Peso Argentino (ARS)</option>
    </select>

    <label for="valor">Valor da Compra:</label>
    <input type="number" id="valor" placeholder="Ex: 1000">

    <button id="btn-calcular">Calcular Câmbio</button>

    <div class="result-box" id="caixa-resultado" style="display: none;">
      <p>PTAX Oficial (Venda): R$ <span id="cotacao-base">...</span></p>
      <p>Data Cotação: <strong><span id="data-ptax">...</span></strong></p>
      <p>Spread Nubank: <strong>4%</strong></p>
      <p>IOF: <strong>3,50%</strong></p>
      <h3>Total: ≈ R$ <span id="total">...</span></h3>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
